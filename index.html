<!DOCTYPE html>
<html>

<head>

<title>surprise little girl</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
background:linear-gradient(#4facfe,#00f2fe);
overflow:hidden;
}

h1{
margin-top:80px;
font-size:50px;
}

#tapbox{
margin-top:40px;
display:inline-block;
padding:20px 40px;
font-size:22px;
background:white;
color:#333;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

#tapbox:hover{
transform:scale(1.1);
}

#surprise{
display:none;
margin-top:40px;
}

img{
width:350px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
animation:pop 0.8s ease;
}

.message{
font-size:24px;
margin-top:20px;
}

@keyframes pop{
0%{transform:scale(0)}
100%{transform:scale(1)}
}

/* balloons */

.balloon{
position:fixed;
bottom:-120px;
width:60px;
height:80px;
border-radius:50%;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

</style>

</head>

<body>

<h1>Ky haal h Chotuuuuuuuuuu</h1>

<div id="tapbox" onclick="showSurprise()">
Tap Me 🎁
</div>

<div id="surprise">

<img src="photo14.jpg">

<div class="message">
Kam kam gusssa kra kr laldi <br>
shaaant hojaaao. <br>
You are truly the best.
</div>

</div>

<script>

function showSurprise(){

document.getElementById("tapbox").style.display="none";

document.getElementById("surprise").style.display="block";

}

/* balloons */

function balloon(){

let b=document.createElement("div");

b.className="balloon";

b.style.left=Math.random()*100+"vw";

b.style.background=
"rgb("+Math.random()*255+","+Math.random()*255+","+Math.random()*255+")";

document.body.appendChild(b);

setTimeout(()=>{b.remove()},10000);

}

setInterval(balloon,500);

</script>

</body>

</html>
