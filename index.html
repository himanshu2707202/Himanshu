<!DOCTYPE html>
<html>

<head>

<title>Chotu Surprise</title>

<style>

body{
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family: Arial;
text-align:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
position:relative;
}

h1{
cursor:pointer;
font-size:60px;
}

img{
position:absolute;
top:-220px;
left:50%;
transform:translateX(-50%);
width:200px;
display:none;
}

</style>

</head>

<body>

<div class="container">

<h1 onclick="showImage()">Chotu</h1>

<img id="photo" src="chotu.png">

</div>

<script>

function showImage(){

document.getElementById("photo").style.display="block";

}

</script>

</body>

</html>
