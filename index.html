<!DOCTYPE html>
<html>

<head>

<title>For You 💛</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(#c9f3ff,#ffd6e7);
overflow:hidden;
color:#333;
}

.container{
margin-top:90px;
padding:20px;
}

.text{
font-size:24px;
max-width:700px;
margin:auto;
min-height:80px;
}

img{
width:320px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
margin-top:20px;
}

.emoji{
font-size:50px;
margin-bottom:20px;
}

button{
margin-top:40px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff9ac6;
color:white;
cursor:pointer;
}

button:hover{
transform:scale(1.1);
}

.flower{
position:fixed;
font-size:22px;
animation:fall 9s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px)}
100%{transform:translateY(110vh)}
}

</style>

</head>

<body>

<div class="container">

<div class="emoji" id="emoji">🐰</div>

<div class="text" id="text">
Hey chotuu… I made something small for you 💛
</div>

<img id="photo" src="hug.jpg">

<br>

<button onclick="nextSlide()">Next ➜</button>

</div>

<script>

let slide=0;

let messages=[

"Hey chotuu… I made something small for you 💛",

"Chinta mtt kro chotuu i know you are the best beta or aaise sb k sath hota h but holding up things khaskarr past khushi se jayda dukh deta h or aaap aache se jaanti ho ye baaat.",

"You don’t have to carry everything alone.",

"Some days are heavy… and that's okay.",

"You matter more than you realise.",

"I'm always here if you ever need me.",

"Remember maine ky bola tha aapko…",

"remember maine ky bola tha aapko to beta stay strong and remember m idhrr he hu jb sahi lage aap krlena baat 💛"

];

let emojis=["🐰","🌸","🐻","⭐","🦋","🐱","🌈","💛"];

function typeText(text){

let i=0;
let speed=35;

document.getElementById("text").innerHTML="";

function typing(){
if(i<text.length){
document.getElementById("text").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,speed);
}
}

typing();

}

function nextSlide(){

slide++;

if(slide>=messages.length){
slide=messages.length-1;
}

typeText(messages[slide]);

document.getElementById("emoji").innerText=emojis[slide];

/* change image at the "remember" slide */

if(slide==6){
document.getElementById("photo").src="motivation.jpg";
}

}

function flower(){

let f=document.createElement("div");

f.className="flower";

f.style.left=Math.random()*100+"vw";

f.innerHTML="🌸";

document.body.appendChild(f);

setTimeout(()=>{f.remove()},9000);

}

setInterval(flower,700);

</script>

</body>

</html>
