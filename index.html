<!DOCTYPE html>
<html>
<head>

<title>Birthday Surprise 🎉</title>

<style>

body{
background:#d40000;
color:white;
text-align:center;
font-family:Arial;
}

img{
width:400px;
border-radius:15px;
margin-top:30px;
}

button{
margin-top:30px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:white;
color:#d40000;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🎂 Happy Birthday 🎉</h1>

<img id="slide" src="photo1.jpg">

<p id="text">Today is your special day!</p>

<button onclick="next()">Next Surprise 🎁</button>

<script>

let images=[
"photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg",
"photo5.jpg","photo6.jpg","photo7.jpg","photo8.jpg",
"photo9.jpg","photo10.jpg","photo11.jpg","photo12.jpg",
"photo13.jpg","photo14.jpg","photo15.jpg","photo16.jpg"
];

let messages=[
"Today is your special day 🎂",
"Another year older 😄",
"So many memories together 📸",
"You are an amazing friend ❤️",
"More adventures ahead 🚀",
"Stay awesome always 🌟",
"Friends make life brighter ✨",
"Keep smiling 😊",
"You deserve happiness 🌍",
"Another birthday another memory 🎉",
"Life is better with friends 💙",
"More laughs to come 😂",
"Never stop dreaming ⭐",
"You are special 💫",
"Almost the final surprise 🎁",
"HAPPY BIRTHDAY 🎂"
];

let i=0;

function next(){

i++;

if(i>=images.length){
i=0;
}

document.getElementById("slide").src=images[i];
document.getElementById("text").innerText=messages[i];

}

</script>

</body>
</html>
