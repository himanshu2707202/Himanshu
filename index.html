<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>I'm Sorry ❤️</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
}

.container{
    background:white;
    padding:40px;
    border-radius:20px;
    width:320px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:20px;
}

button{
    padding:14px 30px;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:#ff4b5c;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    background:#ff1e3c;
}

#note{
    display:none;
    margin-top:25px;
    font-size:17px;
    color:#444;
}

.heart{
    position:absolute;
    color:red;
    font-size:20px;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-10vh);
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="container">

<h2>Tap this button a few times 💕</h2>

<button onclick="press()">Tap Me</button>

<div id="note">

<h3>I'm Really Sorry ❤️</h3>

<p>
I know I messed up...  
and I truly regret it.

You mean a lot to me and  
I never wanted to hurt you.

I hope you can forgive me.  
🌸
</p>

</div>

</div>

<script>

let clicks = 0;
let target = Math.floor(Math.random()*6) + 5;

function press(){

clicks++;

if(clicks >= target){
document.getElementById("note").style.display = "block";
}

}

function createHeart(){

let heart = document.createElement("div");
heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left = Math.random()*100+"vw";
heart.style.fontSize = Math.random()*20+15+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,400);

</script>

</body>
</html>
