<!DOCTYPE html>
<html>

<head>

<title>Birthday Surprise 🎉</title>

<style>

body{
margin:0;
background:#c40000;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

.container{
margin-top:50px;
}

h1{
font-size:45px;
}

img{
width:420px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
animation:drop 1s ease;
}

.message{
font-size:24px;
margin-top:20px;
animation:fade 2s;
}

button{
margin-top:30px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:white;
color:#c40000;
cursor:pointer;
}

button:hover{
transform:scale(1.1);
}

@keyframes drop{
0%{transform:translateY(-200px);opacity:0;}
100%{transform:translateY(0);opacity:1;}
}

@keyframes fade{
0%{opacity:0;}
100%{opacity:1;}
}

/* balloons */

.balloon{
position:fixed;
bottom:-120px;
width:60px;
height:80px;
border-radius:50%;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

</style>

</head>

<body>

<div class="container">

<h1 id="title">🎉 Happy Birthday 🎂</h1>

<img id="photo" src="photo1.jpg">

<div class="message" id="msg"></div>

<button onclick="nextSlide()">Next Surprise 🎁</button>

</div>

<script>

let images=[
"photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg",
"photo5.jpg","photo6.jpg","photo7.jpg","photo8.jpg",
"photo9.jpg","photo10.jpg","photo11.jpg","photo12.jpg",
"photo13.jpg","photo14.jpg","photo15.jpg","photo16.jpg"
];

let messages=[

["Today is YOUR day 🎂",
"Hope it is filled with joy",
"Let the surprises begin 🎉"],

["Another year older 😄",
"But still the same crazy friend",
"And that's perfect 😂"],

["Remember this moment 📸",
"A memory worth keeping",
"Forever in our hearts ❤️"],

["Some friendships",
"Are simply priceless",
"Like ours 😌"],

["Life is brighter",
"When friends like you exist",
"Stay awesome 🌟"],

["Too many selfies",
"Too many laughs",
"Too many memories 🤣"],

["Adventures with you",
"Are always the best",
"More to come 🚀"],

["Another year",
"Another chapter",
"Another amazing story 📖"],

["Smile big today 😄",
"Laugh loudly",
"Enjoy every second"],

["You deserve",
"All the happiness",
"In the world 🌍"],

["Friends like you",
"Make life magical",
"Never change ✨"],

["Another moment",
"Another memory",
"Another smile 😊"],

["Keep dreaming",
"Keep shining",
"Keep being YOU ⭐"],

["You are special",
"More than you know",
"Always remember that 💙"],

["Almost the final surprise 🎁",
"Hope you're smiling",
"Because you deserve it"],

["Final surprise 🎉",
"You are an amazing friend",
"HAPPY BIRTHDAY ❤️"]

];

let slide=0;

function nextSlide(){

document.getElementById("photo").src=images[slide];

document.getElementById("msg").innerHTML=
messages[slide].join("<br>");

slide++;

if(slide>=images.length){
slide=0;
}

}

/* balloons */

function balloon(){

let b=document.createElement("div");

b.className="balloon";

b.style.left=Math.random()*100+"vw";

b.style.background=
"rgb("+Math.random()*255+","+Math.random()*255+","+Math.random()*255+")";

document.body.appendChild(b);

setTimeout(()=>{b.remove()},10000);

}

setInterval(balloon,500);

nextSlide();

</script>

</body>

</html>
